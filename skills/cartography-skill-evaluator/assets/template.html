<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Cartography Skill Evaluation Map</title>
  <style>
    :root { color-scheme: light; --ink:#172033; --muted:#637083; --line:#d9e0ea; --bg:#f7f9fc; --panel:#ffffff; --accent:#2563eb; --risk:#b42318; }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; color: var(--ink); background: var(--bg); }
    main { max-width: 1180px; margin: 0 auto; padding: 36px 24px 48px; }
    header { display: grid; grid-template-columns: 180px 1fr; gap: 24px; align-items: stretch; margin-bottom: 24px; }
    .score { background: var(--ink); color: white; border-radius: 8px; padding: 24px; }
    .score b { display: block; font-size: 56px; line-height: 1; }
    .score span { color: #cbd5e1; font-size: 14px; }
    .summary { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 22px; }
    h1 { margin: 0 0 10px; font-size: 24px; letter-spacing: 0; }
    h2 { margin: 0 0 14px; font-size: 16px; }
    p { margin: 6px 0; color: var(--muted); overflow-wrap: anywhere; }
    section { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 20px; margin-top: 16px; }
    table { width: 100%; border-collapse: collapse; font-size: 14px; }
    th { text-align: left; color: var(--muted); font-weight: 600; border-bottom: 1px solid var(--line); padding: 10px 8px; }
    td { border-bottom: 1px solid var(--line); padding: 12px 8px; vertical-align: top; }
    td span { display: block; color: var(--muted); margin-top: 4px; }
    .bar { height: 10px; background: #e8edf5; border-radius: 999px; overflow: hidden; min-width: 120px; }
    .bar i { display: block; height: 100%; background: var(--accent); }
    ul { margin: 0; padding-left: 20px; }
    li { margin: 10px 0; }
    li span, li em { display: block; color: var(--muted); font-style: normal; margin-top: 3px; }
    @media (max-width: 760px) {
      main { padding: 20px 14px 32px; }
      header { grid-template-columns: 1fr; }
      table { display: block; overflow-x: auto; white-space: nowrap; }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="score"><b>__SCORE__</b><span>__GRADE__</span></div>
      <div class="summary">
        <h1>Cartography Skill Evaluation Map</h1>
        <p><strong>Target:</strong> __TARGET__</p>
        <p><strong>Mode:</strong> __MODE__</p>
        <p><strong>Generated:</strong> __GENERATED_AT__</p>
      </div>
    </header>

    <section>
      <h2>Category Map</h2>
      <table>
        <thead>
          <tr><th>Category</th><th>Score</th><th>Bar</th><th>Evidence</th><th>Gap</th></tr>
        </thead>
        <tbody>
          __CATEGORY_ROWS__
        </tbody>
      </table>
    </section>

    <section>
      <h2>Findings</h2>
      <ul>
        __FINDINGS__
      </ul>
    </section>

    <section>
      <h2>ROI Actions</h2>
      <ul>
        __ACTIONS__
      </ul>
    </section>
  </main>
</body>
</html>
